<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Stats</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap');
        
        body { margin: 0; padding: 20px; overflow: hidden; background: transparent; font-family: 'Orbitron', sans-serif; }

        /* NEON BOX */
        #stats-container {
            width: 320px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff00ff;
            box-shadow: 0 0 15px #ff00ff, inset 0 0 10px #ff00ff;
            padding: 15px; color: #fff;
            transform: skewX(-10deg); /* Cyberpunk Tilt */
            margin-left: 20px;
        }

        .label { font-size: 10px; color: #00ffff; letter-spacing: 2px; margin-bottom: 5px; text-shadow: 0 0 5px #00ffff; }

        /* ROTATOR */
        .rotator-box { display: flex; align-items: center; justify-content: space-between; height: 50px; }
        
        .tipper-name { 
            font-size: 22px; font-weight: 900; color: #fff; 
            text-shadow: 2px 2px 0px #ff00ff;
            opacity: 0; transition: opacity 0.3s;
        }
        .tipper-amount { 
            font-size: 20px; color: #00ffff; text-shadow: 0 0 10px #00ffff; 
            opacity: 0; transition: opacity 0.3s;
        }
        .visible { opacity: 1 !important; }

        .rank-badge { 
            background: #ff00ff; color: #000; padding: 2px 5px; 
            font-size: 12px; margin-right: 10px; font-weight: bold;
        }

        /* LATEST LIST */
        .divider { height: 2px; background: #00ffff; margin: 15px 0; box-shadow: 0 0 10px #00ffff; }
        .latest-list { list-style: none; padding: 0; margin: 0; }
        .latest-item { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: #ddd; }
        .latest-amt { color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }
    </style>
</head>
<body>
    <div id="stats-container">
        <div class="label">TOP COMMANDERS</div>
        <div class="rotator-box">
            <div style="display:flex; align-items:center;">
                <span id="rank" class="rank-badge">#1</span>
                <span id="rotator-name" class="tipper-name">Loading...</span>
            </div>
            <span id="rotator-amount" class="tipper-amount">0</span>
        </div>
        
        <div class="divider"></div>
        
        <div class="label">INCOMING SIGNAL</div>
        <ul id="latest-list" class="latest-list">
            </ul>
    </div>

    <script>
        // 1. SUPABASE OBS FIX: disable 'persistSession'
        const client = window.supabase.createClient(
            "https://yohrquotbdmsxfeyxtqr.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaHJxdW90YmRtc3hmZXl4dHFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzA5MzUsImV4cCI6MjA5MDk0NjkzNX0.C_8yl1JkBYUCoHjsFQWalWipOLmzJMJsJ8QyKjZu8MM",
            { auth: { persistSession: false } }
        );

        var topTippers = [];
        var latestTippers = [];
        var currentIndex = 0;
        var myUsername = "";
        
        // 1. Get Token from URL
        var pathParts = window.location.pathname.split('/');
        var token = pathParts[pathParts.length - 1]; 

        // 2. Initialize System
        async function initStats() {
            if (!token) return;

            // Get the username for this token to use in the Realtime listener
            const { data: user } = await client.from('users').select('username').eq('obs_token', token).single();
            if (!user) return;
            
            myUsername = user.username;

            // Fetch initial data
            await fetchStats();

            // Set up Supabase Realtime Listener
            client
                .channel('stats-room')
                .on(
                    'postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'tips', filter: `username=eq.${myUsername}` },
                    (payload) => {
                        // Delay fetch by 2s so the alert pop-up plays first
                        setTimeout(() => fetchStats(), 2000);
                    }
                )
                .subscribe();
        }

        // 3. Fetch API Data
        async function fetchStats() {
            try {
                const res = await fetch(`/stats/${token}`);
                const data = await res.json();
                
                topTippers = data.top || []; 
                latestTippers = data.latest || [];
                
                updateDisplay();
            } catch(e) { 
                console.error("Stats Error:", e); 
            }
        }

        // 4. Update the UI
        function updateDisplay() {
            // A. UPDATE LATEST TIPS LIST (Bottom section)
            const listEl = document.getElementById('latest-list');
            listEl.innerHTML = ''; // Clear current list
            
            if (latestTippers.length === 0) {
                listEl.innerHTML = '<li class="latest-item">NO SIGNALS DETECTED</li>';
            } else {
                latestTippers.forEach(tip => {
                    listEl.innerHTML += `
                        <li class="latest-item">
                            <span>${tip.sender_name}</span> 
                            <span class="latest-amt">₹${tip.amount}</span>
                        </li>
                    `;
                });
            }

            // B. START TOP COMMANDERS ROTATION
            if (!topTippers || topTippers.length === 0) {
                document.getElementById('rotator-name').innerText = "NO DATA";
                document.getElementById('rotator-amount').innerText = "₹0";
                document.getElementById('rotator-name').classList.add('visible');
                document.getElementById('rotator-amount').classList.add('visible');
                return;
            }

            if (window.rotatorInterval) clearInterval(window.rotatorInterval);
            
            currentIndex = 0;
            rotateTopBar(); // Run once instantly
            window.rotatorInterval = setInterval(rotateTopBar, 4000); // Swap every 4s
        }

        // 5. Rotation Animation Logic
        function rotateTopBar() {
            if (topTippers.length === 0) return;

            const nameEl = document.getElementById('rotator-name');
            const amtEl = document.getElementById('rotator-amount');
            const rankEl = document.getElementById('rank');

            // Fade Out
            nameEl.classList.remove('visible');
            amtEl.classList.remove('visible');

            setTimeout(() => {
                // Change Data
                var tipper = topTippers[currentIndex];
                rankEl.innerText = '#' + (currentIndex + 1);
                nameEl.innerText = tipper.sender_name;
                amtEl.innerText = `₹${tipper.amount}`;
                
                // Fade In
                nameEl.classList.add('visible');
                amtEl.classList.add('visible');

                // Move to next person
                currentIndex = (currentIndex + 1) % topTippers.length;
            }, 300); // 0.3s wait to match CSS transition time
        }

        // Boot
        initStats();
    </script>
</body>
</html>
