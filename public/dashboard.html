<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XDTip HUD | Commander</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ea;
            --bg-dark: #03040b;
            --panel-bg: rgba(5, 8, 20, 0.85);
            --grid-color: rgba(0, 243, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: #c8d3f5;
            overflow-x: hidden;
        }

        /* CRT Scanlines and Grid Background */
        .bgfx {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .bgfx::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* TOP NAV */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            height: 70px;
        }

        .nav-brand {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }

        .nav-links { display: flex; height: 100%; }

        .nav-links a {
            display: flex;
            align-items: center;
            padding: 0 25px;
            color: #7b8ebd;
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 15px;
            text-transform: uppercase;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.05);
            border-bottom: 2px solid var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }

        /* PROFILE */
        .profile { text-align: center; padding: 40px; position: relative; }
        
        .avatar-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--neon-cyan);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .avatar {
            width: 130px; 
            height: 130px;
            background: #111;
            background-size: cover;
            background-position: center;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .username {
            font-size: 32px;
            font-weight: 700;
            margin-top: 15px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan);
            letter-spacing: 2px;
        }

        /* INPUTS & BUTTONS */
        input {
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            border-left: 3px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: 'Share Tech Mono', monospace;
            margin-top: 10px;
            outline: none;
            transition: 0.3s;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .green { background: transparent; color: var(--neon-cyan); border: 1px solid var(--neon-cyan); }
        .green:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
        .red { background: transparent; color: var(--neon-magenta); border: 1px solid var(--neon-magenta); }
        .red:hover { background: var(--neon-magenta); color: #000; box-shadow: 0 0 15px var(--neon-magenta); }

        /* LAYOUT */
        .section { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .card {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 243, 255, 0.15);
            padding: 25px;
            backdrop-filter: blur(10px);
            position: relative;
            margin-bottom: 20px;
        }

        .row { display: flex; gap: 25px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 300px; }

        .linkbox { display: flex; }
        .linkbox input { flex: 1; border-right: none; }
        .linkbox button { margin-top: 10px; clip-path: none; }

        table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono', monospace; }
        td, th { padding: 12px 8px; border-bottom: 1px solid rgba(0, 243, 255, 0.1); text-align: left; }
        th { color: var(--neon-magenta); text-transform: uppercase; font-size: 13px; }

        .loading { animation: pulse-glow 1.5s infinite; }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 10px var(--neon-cyan); }
        }

        .popup {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 5, 0.9);
            display: none; justify-content: center; align-items: center;
            z-index: 999;
        }
        .popup-box { background: var(--panel-bg); border: 1px solid var(--neon-cyan); padding: 40px; width: 320px; text-align: center; }
    </style>
</head>
<body>

<div class="bgfx"></div>

<div class="nav">
    <div class="nav-brand">XD_TIP // SYS</div>
    <div class="nav-links">
        <a href="#">HOME</a>
        <a href="#" class="active">DASHBOARD</a>
        <a href="#">LEARN</a>
        <a href="#">CONTACT</a>
    </div>
    <div class="nav-actions">
        <button class="btn red" onclick="logout()">[ TERMINATE ]</button>
    </div>
</div>

<div class="profile">
    <div class="avatar-wrapper">
        <div class="avatar" id="avatar"></div>
    </div>
    <div class="username loading" id="username">INITIALIZING...</div>

    <input id="nameInput" placeholder="> Enter Designation"><br>
    <input type="file" id="logoUpload" style="margin-top:15px;"><br>
    <button class="btn green" onclick="saveProfile()">UPLOAD DATA</button>
</div>

<div class="section row">
    <div class="card col">
        <h3>CREDITS</h3>
        <h2 id="balance" class="loading">₹--</h2>
    </div>

    <div class="card col" id="kycSection">
        <h3>SECURITY CLEARANCE (KYC)</h3>
        <button class="btn green" onclick="openKyc()">INITIATE KYC</button>
        <p id="kycStatus" class="loading" style="margin-top:15px; font-family:'Share Tech Mono';">STATUS: UNKNOWN</p>
    </div>

    <div class="card col" id="upiSection" style="display:none;">
        <h3>LINKED NODE (UPI)</h3>
        <p id="upi" style="font-family:'Share Tech Mono'; font-size: 20px; color: var(--neon-cyan);"></p>
    </div>
</div>

<div class="section">
    <div class="card">
        <h3>BROADCAST PROTOCOLS</h3>
        <div class="row">
            <div class="col">
                <p>ALERT HUB</p>
                <div class="linkbox">
                    <input id="alertLink" readonly>
                    <button class="btn green" onclick="copy('alertLink')">COPY</button>
                </div>
            </div>
            <div class="col">
                <p>PUBLIC ENDPOINT</p>
                <div class="linkbox">
                    <input id="tipLink" readonly>
                    <button class="btn green" onclick="copy('tipLink')">COPY</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="section">
    <div class="card">
        <h3>INCOMING TRANSMISSIONS</h3>
        <table>
            <thead>
                <tr><th>SOURCE</th><th>PAYLOAD</th><th>CREDITS</th><th>TIMESTAMP</th></tr>
            </thead>
            <tbody id="transmissionBody">
                </tbody>
        </table>
    </div>
</div>

<div class="popup" id="kycPopup">
    <div class="popup-box">
        <h3 style="color:var(--neon-cyan);">KYC UPLINK</h3>
        <input id="fullName" placeholder="> Legal Designation"><br>
        <input id="upiInput" placeholder="> UPI Identifier"><br>
        <input type="file" id="panUpload" accept="image/*,application/pdf"><br>
        <div style="margin-top: 15px;">
            <button class="btn green" id="submitKycBtn" onclick="submitKyc()">TRANSMIT</button>
            <button class="btn red" onclick="closeKyc()">ABORT</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// INITIALIZE SUPABASE
const client = window.supabase.createClient(
    "https://yohrquotbdmsxfeyxtqr.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaHJxdW90YmRtc3hmZXl4dHFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzA5MzUsImV4cCI6MjA5MDk0NjkzNX0.C_8yl1JkBYUCoHjsFQWalWipOLmzJMJsJ8QyKjZu8MM"
);

let userId = "";
let currentUsername = "";

async function init() {
    const { data } = await client.auth.getUser();

    if (!data.user) {
        // Redirect to login if not authenticated
        // location.href = "/login"; 
        console.log("Not logged in");
        return;
    }

    userId = data.user.id;
    
    // Set static links
    setVal("alertLink", `https://xdtip.in/alert/${userId}`);

    // Fetch Profile
    const { data: profile, error } = await client
        .from("users")
        .select("*")
        .eq("id", userId)
        .single();

    if (profile) {
        currentUsername = profile.username || "GUEST_ENTITY";
        setText("username", currentUsername);
        setText("balance", "₹" + (profile.balance || 0));
        setVal("tipLink", `https://xdtip.in/${currentUsername}`);
        
        if (profile.logo) {
            document.getElementById("avatar").style.backgroundImage = `url(${profile.logo})`;
        }

        // KYC UI Logic
        if (profile.kyc === true || profile.kyc === "true") {
            document.getElementById("kycSection").style.display = "none";
            document.getElementById("upiSection").style.display = "block";
            document.getElementById("upi").innerText = profile.upi || "NO UPI LINKED";
        } else if (profile.kyc === "pending") {
            setText("kycStatus", "VERIFICATION IN PROGRESS...");
        } else {
            setText("kycStatus", "AWAITING CLEARANCE");
        }

        // Load Tips
        fetchTips(currentUsername);
    }
}

async function fetchTips(username) {
    const tableBody = document.getElementById("transmissionBody");
    
    const { data: tips, error } = await client
        .from("tips")
        .select("*")
        .ilike("username", username)
        .order("created_at", { ascending: false });

    if (error || !tips || tips.length === 0) {
        tableBody.innerHTML = "<tr><td colspan='4' style='text-align:center; opacity:0.5;'>NO TRANSMISSIONS DETECTED</td></tr>";
        return;
    }

    tableBody.innerHTML = "";
    tips.forEach(tip => {
        const date = new Date(tip.created_at).toLocaleString();
        tableBody.insertAdjacentHTML('beforeend', `
            <tr>
                <td style="color: var(--neon-cyan);">${tip.sender_name}</td>
                <td style="color: #8fa1d0; font-style: italic;">"${tip.message || '---'}"</td>
                <td style="color: var(--neon-magenta);">₹${tip.amount}</td>
                <td style="font-size: 12px; opacity:0.6;">${date}</td>
            </tr>
        `);
    });
}

async function saveProfile() {
    const username = document.getElementById("nameInput").value;
    const file = document.getElementById("logoUpload").files[0];
    let logoUrl = null;

    if (file) {
        const fileName = `${userId}_${Date.now()}`;
        const { error } = await client.storage.from("logos").upload(fileName, file);
        if (!error) {
            logoUrl = client.storage.from("logos").getPublicUrl(fileName).data.publicUrl;
        }
    }

    const updates = { id: userId };
    if (username) updates.username = username;
    if (logoUrl) updates.logo = logoUrl;

    const { error } = await client.from("users").upsert(updates);
    
    if (!error) {
        if (username) {
            setText("username", username);
            setVal("tipLink", `https://xdtip.in/${username}`);
        }
        if (logoUrl) document.getElementById("avatar").style.backgroundImage = `url(${logoUrl})`;
        alert("SYSTEM UPDATED");
    }
}

// UI HELPERS
function setText(id, text) {
    const el = document.getElementById(id);
    if(el) { el.innerText = text; el.classList.remove("loading"); }
}
function setVal(id, text) {
    const el = document.getElementById(id);
    if(el) { el.value = text; el.classList.remove("loading"); }
}

function openKyc() { document.getElementById("kycPopup").style.display = "flex"; }
function closeKyc() { document.getElementById("kycPopup").style.display = "none"; }

async function submitKyc() {
    const btn = document.getElementById("submitKycBtn");
    btn.innerText = "UPLOADING...";
    btn.disabled = true;

    const name = document.getElementById("fullName").value;
    const upi = document.getElementById("upiInput").value;
    const panFile = document.getElementById("panUpload").files[0];

    let panUrl = null;
    if (panFile) {
        const fileName = `pan_${userId}_${Date.now()}`;
        const { error } = await client.storage.from("kyc_docs").upload(fileName, panFile);
        if (!error) {
            panUrl = client.storage.from("kyc_docs").getPublicUrl(fileName).data.publicUrl;
        }
    }

    await client.from("users").upsert({
        id: userId,
        name: name,
        upi: upi,
        pan_url: panUrl,
        kyc: "pending"
    });

    setText("kycStatus", "VERIFICATION IN PROGRESS...");
    btn.innerText = "TRANSMIT";
    btn.disabled = false;
    closeKyc();
}

async function copy(id) {
    const text = document.getElementById(id).value;
    await navigator.clipboard.writeText(text);
    alert("LINK COPIED TO CLIPBOARD");
}

async function logout() {
    await client.auth.signOut();
    location.reload();
}

// START SYSTEM
init();
</script>

</body>
</html>
