<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XDTip HUD | Commander</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff; --neon-magenta: #ff00ea; --bg-dark: #03040b;
            --panel-bg: rgba(5, 8, 20, 0.85); --grid-color: rgba(0, 243, 255, 0.05);
        }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg-dark); color: #c8d3f5; overflow-x: hidden; }
        
        /* Background Effects */
        .bgfx { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px); background-size: 40px 40px; }
        .bgfx::after { content: ""; position: absolute; inset: 0; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,.25) 50%), linear-gradient(90deg, rgba(255,0,0,.06), rgba(0,255,0,.02), rgba(0,0,255,.06)); background-size: 100% 4px, 3px 100%; pointer-events: none; }

        /* Navigation */
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; background: rgba(0,0,0,.9); border-bottom: 2px solid var(--neon-cyan); height: 70px; }
        .nav-brand { font-size: 26px; font-weight: 700; color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); }
        .nav-links { display: flex; height: 100%; }
        .nav-links a { display: flex; align-items: center; padding: 0 25px; color: #7b8ebd; text-decoration: none; font-family: 'Share Tech Mono'; transition: .3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--neon-cyan); background: rgba(0,243,255,.05); border-bottom: 2px solid var(--neon-cyan); }

        /* Profile & Avatar */
        .profile { text-align: center; padding: 40px; }
        .avatar-wrapper { width: 140px; height: 140px; margin: auto; display: flex; justify-content: center; align-items: center; background: var(--neon-cyan); clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%); box-shadow: 0 0 20px var(--neon-cyan); }
        .avatar { width: 130px; height: 130px; background: #111 center/cover; clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%); }
        .username { font-size: 32px; font-weight: 700; margin-top: 15px; color: #fff; text-shadow: 0 0 10px var(--neon-cyan); }

        /* Components */
        input { padding: 12px; background: rgba(0,0,0,.6); border: 1px solid #333; border-left: 3px solid var(--neon-cyan); color: var(--neon-cyan); font-family: 'Share Tech Mono'; outline: none; margin: 10px 0; }
        .btn { padding: 10px 20px; border: none; cursor: pointer; font-family: 'Rajdhani'; font-weight: 700; text-transform: uppercase; transition: .2s; clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px); }
        .green { color: var(--neon-cyan); border: 1px solid var(--neon-cyan); background: transparent; }
        .green:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }
        .red { color: var(--neon-magenta); border: 1px solid var(--neon-magenta); background: transparent; }
        .red:hover { background: var(--neon-magenta); color: #000; box-shadow: 0 0 15px var(--neon-magenta); }

        .section { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .card { background: var(--panel-bg); border: 1px solid rgba(0,243,255,.15); padding: 25px; backdrop-filter: blur(10px); position: relative; }
        .row { display: flex; gap: 25px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 300px; }
        
        table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono'; }
        th { color: var(--neon-magenta); text-align: left; padding: 10px; border-bottom: 1px solid rgba(0,243,255,.2); }
        td { padding: 10px; border-bottom: 1px solid rgba(0,243,255,.1); }

        .popup { position: fixed; inset: 0; background: rgba(0,0,5,.9); display: none; justify-content: center; align-items: center; z-index: 999; }
        .popup-box { background: var(--panel-bg); border: 1px solid var(--neon-cyan); padding: 40px; text-align: center; }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: .5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div class="bgfx"></div>

<nav class="nav">
    <div class="nav-brand">XD_TIP // SYS</div>
    <div class="nav-links">
        <a href="index">HOME</a>
        <a href="dashboard" class="active">DASHBOARD</a>
        <a href="learn">LEARN</a>
    </div>
    <button class="btn red" onclick="logout()">[ TERMINATE ]</button>
</nav>

<div class="profile">
    <div class="avatar-wrapper"><div class="avatar" id="avatar"></div></div>
    <div class="username loading" id="username">INITIALIZING...</div>
    <input id="nameInput" placeholder="> Designation">
    <input type="file" id="logoUpload">
    <button class="btn green" onclick="saveProfile()">UPLOAD DATA</button>
</div>

<div class="section row">
    <div class="card col">
        <h3>CREDITS</h3>
        <h2 id="balance" class="loading">₹--</h2>
    </div>
    <div class="card col" id="kycSection">
        <h3>SECURITY CLEARANCE</h3>
        <button class="btn green" onclick="toggleKyc(true)">INITIATE KYC</button>
        <p id="kycStatus" class="loading">STATUS: UNKNOWN</p>
    </div>
    <div class="card col" id="upiSection" style="display:none;">
        <h3>LINKED NODE</h3>
        <p id="upi" style="color: var(--neon-cyan); font-family: 'Share Tech Mono';"></p>
    </div>
</div>

<div class="section">
    <div class="card">
        <h3>INCOMING TRANSMISSIONS</h3>
        <table>
            <thead><tr><th>SOURCE</th><th>PAYLOAD</th><th>CREDITS</th><th>TIMESTAMP</th></tr></thead>
            <tbody id="transmissionBody"></tbody>
        </table>
    </div>
</div>

<div class="popup" id="kycPopup">
    <div class="popup-box">
        <h3>KYC UPLINK</h3>
        <input id="fullName" placeholder="> Full Name"><br>
        <input id="upiInput" placeholder="> UPI ID"><br>
        <input type="file" id="panUpload"><br>
        <button class="btn green" onclick="submitKyc()">TRANSMIT</button>
        <button class="btn red" onclick="toggleKyc(false)">ABORT</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const client = window.supabase.createClient("https://yohrquotbdmsxfeyxtqr.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaHJxdW90YmRtc3hmZXl4dHFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzA5MzUsImV4cCI6MjA5MDk0NjkzNX0.C_8yl1JkBYUCoHjsFQWalWipOLmzJMJsJ8QyKjZu8MM");
let userId = "";

async function init() {
    const { data: { user } } = await client.auth.getUser();
    if (!user) { location.href = "/login"; return; }
    userId = user.id;

    const { data: profile } = await client.from("users").select("*").eq("id", userId).single();
    if (profile) {
        updateUI(profile);
        if (profile.username) fetchTips(profile.username);
    }
}

function updateUI(p) {
    setText("username", p.username || "GUEST_ENTITY");
    setText("balance", "₹" + (p.balance || 0));
    if (p.logo) document.getElementById("avatar").style.backgroundImage = `url(${p.logo})`;
    
    if (p.kyc === true || p.kyc === "true") {
        document.getElementById("kycSection").style.display = "none";
        document.getElementById("upiSection").style.display = "block";
        document.getElementById("upi").innerText = p.upi || "NO UPI";
    } else {
        setText("kycStatus", p.kyc === "pending" ? "VERIFICATION IN PROGRESS..." : "AWAITING CLEARANCE");
    }
}

async function fetchTips(name) {
    const { data: tips } = await client.from("tips").select("*").ilike("username", name).order("created_at", { ascending: false });
    const body = document.getElementById("transmissionBody");
    body.innerHTML = tips?.length ? tips.map(t => `
        <tr>
            <td style="color:var(--neon-cyan)">${t.sender_name}</td>
            <td>${t.message || '---'}</td>
            <td style="color:var(--neon-magenta)">₹${t.amount}</td>
            <td>${new Date(t.created_at).toLocaleDateString()}</td>
        </tr>`).join('') : "<tr><td colspan='4'>NO DATA</td></tr>";
}

async function saveProfile() {
    const username = document.getElementById("nameInput").value;
    const file = document.getElementById("logoUpload").files[0];
    let logoUrl = null;

    if (file) {
        const path = `${userId}_${Date.now()}`;
        const { data } = await client.storage.from("logos").upload(path, file);
        if (data) logoUrl = client.storage.from("logos").getPublicUrl(path).data.publicUrl;
    }

    const updates = { id: userId, username };
    if (logoUrl) updates.logo = logoUrl;
    
    await client.from("users").upsert(updates);
    location.reload();
}

function setText(id, txt) { const el = document.getElementById(id); el.innerText = txt; el.classList.remove("loading"); }
function toggleKyc(show) { document.getElementById("kycPopup").style.display = show ? "flex" : "none"; }

async function logout() { await client.auth.signOut(); location.href = "/"; }

init();
</script>
</body>
</html>
