<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XDTip HUD | Commander</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --neon-cyan: #00f3ff;
  --neon-magenta: #ff00ea;
  --bg-dark: #03040b;
  --panel-bg: rgba(5, 8, 20, 0.85);
  --grid-color: rgba(0, 243, 255, 0.05);
}

body {
  margin: 0;
  font-family: 'Rajdhani', sans-serif;
  background-color: var(--bg-dark);
  color: #c8d3f5;
  overflow-x: hidden;
}

.bgfx {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1;
  background-image: 
    linear-gradient(var(--grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
  background-size: 40px 40px;
}

.bgfx::after {
  content: "";
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  background-size: 100% 4px, 3px 100%;
  pointer-events: none;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 40px;
  background: rgba(0, 0, 0, 0.9);
  border-bottom: 2px solid var(--neon-cyan);
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
  height: 70px;
}

.nav-brand { font-size: 26px; font-weight: 700; color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); }

.nav-links a {
  padding: 0 25px;
  color: #7b8ebd;
  text-decoration: none;
  font-family: 'Share Tech Mono', monospace;
  font-size: 15px;
  text-transform: uppercase;
}

.nav-links a.active { color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); }

.profile { text-align: center; padding: 40px; }
.avatar-wrapper {
  width: 140px; height: 140px; margin: auto;
  background: var(--neon-cyan);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display: flex; justify-content: center; align-items: center;
}
.avatar {
  width: 130px; height: 130px;
  background: #111; background-size: cover; background-position: center;
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
}

.username { font-size: 32px; font-weight: 700; margin-top: 15px; color: #fff; text-shadow: 0 0 10px var(--neon-cyan); }

.section { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
.card { background: var(--panel-bg); border: 1px solid rgba(0, 243, 255, 0.15); padding: 25px; position: relative; backdrop-filter: blur(10px); margin-bottom: 20px; }

.row { display: flex; gap: 25px; }
.col { flex: 1; }

table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono', monospace; }
th { color: var(--neon-magenta); text-align: left; padding: 12px; border-bottom: 1px solid rgba(0, 243, 255, 0.2); }
td { padding: 12px; border-bottom: 1px solid rgba(0, 243, 255, 0.05); }

.btn { padding: 10px 20px; border: 1px solid var(--neon-cyan); background: transparent; color: var(--neon-cyan); cursor: pointer; font-family: 'Rajdhani'; font-weight: 700; text-transform: uppercase; }
.btn:hover { background: var(--neon-cyan); color: #000; }
.red { border-color: var(--neon-magenta); color: var(--neon-magenta); }

input { background: rgba(0,0,0,0.5); border: 1px solid #333; border-left: 3px solid var(--neon-cyan); color: var(--neon-cyan); padding: 10px; width: 100%; box-sizing: border-box; }

.loading { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body>

<div class="bgfx"></div>

<div class="nav">
  <div class="nav-brand">XD_TIP // HUD</div>
  <div class="nav-actions">
    <button class="btn red" onclick="logout()">[ TERMINATE ]</button>
  </div>
</div>

<div class="profile">
  <div class="avatar-wrapper">
    <div class="avatar" id="avatar"></div>
  </div>
  <div class="username loading" id="username">INITIALIZING...</div>
  <input id="nameInput" placeholder="> Enter Designation"><br>
  <input type="file" id="logoUpload" style="margin-top:15px; margin-bottom: 15px;"><br>
  <button class="btn green" onclick="saveProfile()">UPLOAD DATA</button>
</div>

<div class="section row">
  <div class="card col">
    <h3>CREDITS</h3>
    <h2 id="balance" class="loading">₹--</h2>
  </div>
  <div class="card col">
    <h3>PUBLIC UPLINK</h3>
    <div class="linkbox">
      <input id="tipLink" class="loading" readonly>
      <button class="btn green" onclick="copy('tipLink')">COPY</button>
    </div>
  </div>
</div>

<div class="section">
  <div class="card">
    <h3>INCOMING TRANSMISSIONS</h3>
    <table>
      <thead>
        <tr><th>SOURCE</th><th>PAYLOAD</th><th>CREDITS</th><th>TIMESTAMP</th></tr>
      </thead>
      <tbody id="transmissionBody">
        <tr><td colspan="4" style="text-align:center;">SCANNING...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const client = window.supabase.createClient(
  "https://yohrquotbdmsxfeyxtqr.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaHJxdW90YmRtc3hmZXl4dHFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzA5MzUsImV4cCI6MjA5MDk0NjkzNX0.C_8yl1JkBYUCoHjsFQWalWipOLmzJMJsJ8QyKjZu8MM"
);

let userId = "";

async function init() {
  const { data: { user } } = await client.auth.getUser();

  if (!user) {
    location.href = "/login";
    return;
  }

  userId = user.id;

  try {
    const { data: profile } = await client
      .from("users")
      .select("*")
      .eq("id", userId)
      .single();

    if (profile) {
      setText("username", `@${profile.username || 'GUEST_ENTITY'}`);
      setVal("tipLink", `https://xdtip.in/${profile.username}`);
      setText("balance", "₹" + (profile.balance || 0));

      if (profile.logo) {
        document.getElementById("avatar").style.backgroundImage = `url(${profile.logo})`;
      }

      // Start fetching tips once we have the username
      fetchTips(profile.username);
    }
  } catch (e) {
    console.error("Initialization Error:", e);
  }
}

async function fetchTips(myUsername) {
  const tableBody = document.getElementById("transmissionBody");

  const { data: tips, error } = await client
    .from("tips")
    .select("*")
    .ilike("username", myUsername)
    .order("created_at", { ascending: false });

  if (error) {
    tableBody.innerHTML = "<tr><td colspan='4' style='color:red;'>ERROR: DATA_CORRUPTED</td></tr>";
    return;
  }

  if (!tips || tips.length === 0) {
    tableBody.innerHTML = "<tr><td colspan='4' style='text-align:center; opacity:0.5;'>NO TRANSMISSIONS DETECTED</td></tr>";
    return;
  }

  tableBody.innerHTML = "";
  tips.forEach(tip => {
    const date = new Date(tip.created_at).toLocaleString();
    const row = `
      <tr>
        <td style="color: var(--neon-cyan); font-weight:bold;">${tip.sender_name || 'ANON'}</td>
        <td style="color: #8fa1d0; font-style: italic;">"${tip.message || '---'}"</td>
        <td style="color: var(--neon-magenta); font-weight:bold;">₹${tip.amount}</td>
        <td style="font-size: 12px; opacity:0.6;">${date}</td>
      </tr>
    `;
    tableBody.insertAdjacentHTML('beforeend', row);
  });
}

async function saveProfile(){
  const username = document.getElementById("nameInput").value;
  const file = document.getElementById("logoUpload").files[0];
  let logoUrl = null;

  if(file){
    const fileName = userId + "_" + Date.now();
    const { error } = await client.storage.from("logos").upload(fileName, file);
    if(!error){
      logoUrl = client.storage.from("logos").getPublicUrl(fileName).data.publicUrl;
      document.getElementById("avatar").style.backgroundImage = `url(${logoUrl})`;
    }
  }

  await client.from("users").upsert({ id: userId, username: username, logo: logoUrl });
  setText("username", "@" + username);
  setVal("tipLink", `https://xdtip.in/${username}`);
}

function setText(id, text) {
  const el = document.getElementById(id);
  el.innerText = text;
  el.classList.remove("loading");
}

function setVal(id, text) {
  const el = document.getElementById(id);
  el.value = text;
  el.classList.remove("loading");
}

function copy(id) {
  const el = document.getElementById(id);
  el.select();
  document.execCommand("copy");
}

async function logout() {
  await client.auth.signOut();
  location.href = "https://xdtip.in/";
}

init();
</script>
</body>
</html>
