<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>Classic Overlay</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* --- FONT SETUP (Classic/Royal Style) --- */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap');
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background: transparent; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Cinzel', serif; /* Classic Font */
        }
        
        #alert-box {
            text-align: center; 
            opacity: 0; 
            /* Classic = No Skew, Standard Scaling */
            transform: scale(0.9); 
            transition: all 0.5s ease-in-out;
            
            /* Classic Design: Dark Background + Gold Borders */
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            padding: 40px 60px; 
            
            /* Double Gold Border for "Frame" effect */
            border: 4px double #D4AF37; 
            border-radius: 8px; /* Slightly rounded */
            
            min-width: 500px;
            
            /* Warm Gold Shadow */
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3), inset 0 0 10px rgba(0,0,0,0.8);
        }
        
        #alert-box.show { 
            opacity: 1; 
            transform: scale(1); 
        }
        
        .alert-text { 
            font-size: 32px; 
            color: #f0f0f0; 
            margin: 15px 0 0 0; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 700;
        }
        
        /* The Tipper Name */
        .highlight { 
            color: #D4AF37; /* Gold */
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-weight: 900;
            display: block;
            font-size: 40px;
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 5px;
        } 
        
        /* The Amount */
        .amount { 
            color: #fff; 
            font-size: 56px; 
            display: block; 
            margin: 15px 0; 
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6); 
            font-weight: 900;
        }
        
        /* The Message */
        .message { 
            font-size: 20px; 
            color: #ccc; 
            margin-top: 20px; 
            font-weight: normal; 
            font-family: 'Lato', sans-serif; /* Clean font for readability */
            font-style: italic;
        }
        
        .alert-image { 
            width: 110px; 
            height: 110px; 
            border: 3px solid #D4AF37; /* Gold Border */
            border-radius: 50%; 
            object-fit: cover; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            background: #000;
        }
    </style>
</head>
<body>
    <div id="alert-box">
        <img id="alert-image" class="alert-image" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExN21keThkanpheXM3Y2lqY3ZwY2hzcHhsbmRkOHhlaWxuMDMxd2luaSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/xTiTnqUxyWbsAXq7Ju/giphy.gif">
        
        <h1 class="alert-text">
            <span id="sender" class="highlight">USER</span> 
            JUST CONTRIBUTED
            <span id="amount" class="amount">500</span>
        </h1>
        
        <p class="message" id="message-text">Message goes here...</p>
    </div>

    <script>
        var socket = io(); 
        var queue = []; 
        var isPlaying = false;

        var pathParts = window.location.pathname.split('/');
        var uuid = pathParts[pathParts.length - 1]; 
        if (!uuid) uuid = pathParts[pathParts.length - 2];

        if (uuid && uuid !== "overlay") { socket.emit('join-overlay', uuid); }

        socket.on('new-tip', (data) => { queue.push(data); processQueue(); });

        function processQueue() {
            if (isPlaying || queue.length === 0) return;
            isPlaying = true;
            var data = queue.shift();
            showAlert(data);
        }

        function showAlert(data) {
            var senderName = data.tipper || "Anonymous";
            var messageText = data.message || "Thank you for the support!";
            
            // Update Text
            document.getElementById('sender').innerText = senderName;
            document.getElementById('amount').innerText = "₹" + data.amount;
            document.getElementById('message-text').innerText = `"${messageText}"`;
            
            // Show Box
            var box = document.getElementById('alert-box');
            box.classList.add('show');

            // --- FIXED ROBUST TTS LOGIC ---
            
            // 1. Prepare Text
            var fullText = `${senderName} sent ${data.amount} rupees. ${messageText}`;
            
            // 2. Detect Language
            var hasHindiScript = /[\u0900-\u097F]/.test(fullText);
            var lang = hasHindiScript ? 'hi' : 'en'; 
            
            // 3. Robust URL Generation (Prevents 403 Blocking)
            // We use 'idx=0', 'total=1', and 'client=tw-ob' to look like a real browser
            var safeText = encodeURIComponent(fullText.substring(0, 200)); 
            var audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${safeText}&tl=${lang}&total=1&idx=0&textlen=${safeText.length}&client=tw-ob&prev=input&ttsspeed=1`;

            var audio = new Audio(audioUrl);
            
            // 4. Events
            audio.onended = () => finishAlert(box);
            
            // Safety: If audio fails/blocks, close box after 5s anyway
            audio.onerror = () => {
                console.error("Audio failed to load (Check OBS/Network)");
                setTimeout(() => finishAlert(box), 5000); 
            };

            // Play
            audio.play().catch(e => {
                console.error("Autoplay blocked:", e);
                // If blocked, wait 5s then close
                setTimeout(() => finishAlert(box), 5000);
            });
        }

        function finishAlert(box) {
            setTimeout(() => { 
                box.classList.remove('show'); 
                setTimeout(() => { 
                    isPlaying = false; 
                    processQueue(); 
                }, 1000); 
            }, 2000);
        }
    </script>
</body>
</html>
