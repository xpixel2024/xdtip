<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Admin | XDTip</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 250px; background-color: #1e293b; border-right: 1px solid #334155; padding: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { margin-top: 0; color: #38bdf8; font-weight: 800; }
        .nav-btn { background: transparent; color: #cbd5e1; border: none; text-align: left; padding: 12px 15px; margin-bottom: 10px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.2s; }
        .nav-btn:hover, .nav-btn.active { background: #38bdf8; color: #0f172a; }
        .nav-btn.alert { border: 1px solid #ef4444; color: #ef4444; }
        .nav-btn.alert.active { background: #ef4444; color: #fff; }
        .logout-btn { margin-top: auto; color: #ef4444; }
        .logout-btn:hover { background: #ef4444; color: #fff; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header-title { font-size: 28px; margin-top: 0; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 15px;}

        /* --- FORMS & INPUTS --- */
        .payout-form { background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; max-width: 500px; margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; outline: none; }
        .btn-submit { background: #38bdf8; color: #0f172a; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-submit:hover { background: #0ea5e9; }

        /* --- TABLES --- */
        .table-container { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; display: none; }
        .table-container.active { display: block; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px 20px; border-bottom: 1px solid #334155; }
        th { background: #0f172a; font-size: 13px; color: #94a3b8; text-transform: uppercase; }
        td { font-size: 15px; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge.success { background: #22c55e; color: #000; }
        .badge.pending { background: #f59e0b; color: #000; }
        .badge.failed { background: #ef4444; color: #fff; }

        #loader { position: absolute; top:0; left:0; width:100%; height:100%; background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="loader"><h2>Authenticating Admin...</h2></div>

    <div class="sidebar">
        <h2>XDTIP ADMIN</h2>
        <button class="nav-btn active" onclick="switchTab('dashboard')">Dashboard</button>
        <button class="nav-btn" onclick="switchTab('payouts')">Payouts (Settlement)</button>
        <button class="nav-btn" onclick="switchTab('users')">All Users (KYC)</button>
        <button class="nav-btn" onclick="switchTab('tips')">Transactions</button>
        <button class="nav-btn" onclick="switchTab('payouts')">Payouts (Settlement)</button>
        <button class="nav-btn alert" onclick="switchTab('fraud')">Fraud Logs</button>
        <button class="nav-btn logout-btn" onclick="logout()">Exit Admin</button>
    </div>

    <div class="main-content">
        <h1 class="header-title" id="page-title">Platform Overview</h1>

        <div id="tab-payouts" class="table-container">
            <div style="padding: 20px;">
                <div class="payout-form">
                    <h3 style="margin-top:0;">Create New Settlement</h3>
                    <div class="form-group">
                        <label>Select User</label>
                        <select id="payout-user-list">
                            <option value="">Loading users...</option>
                        </select>
                    </div>

                    <div id="tab-payouts" class="table-container">
    <div style="padding: 20px;">
        <div class="payout-form" style="background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; max-width: 500px; margin-bottom: 30px;">
            <h3 style="margin-top:0; color: #38bdf8;">Create New Settlement</h3>
            
            <div style="margin-bottom: 15px;">
                <label style="display:block; color:#94a3b8; font-size:14px; margin-bottom:5px;">Select User</label>
                <select id="payout-user-list" style="width:100%; padding:10px; border-radius:6px; background:#0f172a; color:#fff; border:1px solid #334155;">
                    <option value="">Loading users...</option>
                </select>
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display:block; color:#94a3b8; font-size:14px; margin-bottom:5px;">Settlement Amount (₹)</label>
                <input type="number" id="payout-amount" placeholder="Enter amount" style="width:95%; padding:10px; border-radius:6px; background:#0f172a; color:#fff; border:1px solid #334155;">
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display:block; color:#94a3b8; font-size:14px; margin-bottom:5px;">Transaction ID (T_ID)</label>
                <input type="text" id="payout-tid" placeholder="UTR or Transaction ID" style="width:95%; padding:10px; border-radius:6px; background:#0f172a; color:#fff; border:1px solid #334155;">
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display:block; color:#94a3b8; font-size:14px; margin-bottom:5px;">Status</label>
                <select id="payout-status" style="width:100%; padding:10px; border-radius:6px; background:#0f172a; color:#fff; border:1px solid #334155;">
                    <option value="pending" selected>Pending</option>
                    <option value="success">Success</option>
                    <option value="failed">Failed</option>
                </select>
            </div>

            <button onclick="processPayout()" style="width:100%; padding:12px; background:#38bdf8; color:#0f172a; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">Submit Payout</button>
        </div>

        <h3 style="margin-bottom: 15px;">Recent Payout Logs</h3>
        <table>
            <thead>
                <tr><th>Username</th><th>Amount</th><th>T_ID</th><th>Status</th><th>Date</th></tr>
            </thead>
            <tbody id="payouts-tbody"></tbody>
        </table>
    </div>
</div>
                    
                    <div class="form-group">
                        <label>Settlement Amount (₹)</label>
                        <input type="number" id="payout-amount" placeholder="e.g. 500">
                    </div>
                    <div class="form-group">
                        <label>Transaction ID (T_ID)</label>
                        <input type="text" id="payout-tid" placeholder="Enter bank UTR or T_ID">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="payout-status">
                            <option value="pending" selected>Pending</option>
                            <option value="success">Success</option>
                            <option value="failed">Failed</option>
                        </select>
                    </div>
                    <button class="btn-submit" onclick="processPayout()">Submit Payout</button>
                </div>

                <h3 style="margin-top: 40px;">Recent Payout Logs</h3>
                <table>
                    <thead>
                        <tr><th>Username</th><th>Amount</th><th>T_ID</th><th>Date</th><th>Status</th></tr>
                    </thead>
                    <tbody id="payouts-tbody"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-dashboard" class="table-container active" style="background:transparent; border:none;">
             </div>
        </div>

    <script>
        const client = window.supabase.createClient(
            "https://yohrquotbdmsxfeyxtqr.supabase.co",
            "YOUR_ANON_KEY" // Use your actual key
        );

        let adminEmail = "";
        let cachedUsers = [];

        async function bootAdmin() {
            const { data: { session } } = await client.auth.getSession();
            if (!session) { window.location.href = "/login"; return; }
            adminEmail = session.user.email;
            fetchAdminData();
            fetchPayoutLogs();
        }

        async function fetchAdminData() {
            try {
                const response = await fetch('/api/admin/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: adminEmail })
                });
                const data = await response.json();
                if (!data.success) return;

                document.getElementById('loader').style.display = 'none';
                
                // Save users for the payout dropdown
                cachedUsers = data.users;
                const dropdown = document.getElementById('payout-user-list');
                dropdown.innerHTML = '<option value="">-- Choose User --</option>' + 
                    data.users.map(u => `<option value="${u.username}" data-id="${u.id}">${u.username} (${u.name || 'No Name'})</option>`).join('');

                // ... rest of your existing population logic for stats/users/tips ...
            } catch (err) { console.error(err); }
        }

        async function fetchPayoutLogs() {
            const { data, error } = await client
                .from('payouts')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (data) {
                document.getElementById('payouts-tbody').innerHTML = data.map(p => `
                    <tr>
                        <td>${p.username}</td>
                        <td style="color:#22c55e; font-weight:bold;">₹${p.amount}</td>
                        <td style="font-family:monospace;">${p.t_id}</td>
                        <td>${new Date(p.created_at).toLocaleDateString()}</td>
                        <td><span class="badge ${p.status}">${p.status.toUpperCase()}</span></td>
                    </tr>
                `).join('');
            }
        }

        async function processPayout() {
            const userSelect = document.getElementById('payout-user-list');
            const selectedOption = userSelect.options[userSelect.selectedIndex];
            
            const username = userSelect.value;
            const userId = selectedOption.getAttribute('data-id'); // Fetches UUID from the data attribute
            const amount = document.getElementById('payout-amount').value;
            const t_id = document.getElementById('payout-tid').value;
            const status = document.getElementById('payout-status').value;

            if (!username || !amount || !t_id) {
                alert("Please fill all fields");
                return;
            }

            const { error } = await client.from('payouts').insert([{
                id: userId, // The UUID fetched from database
                username: username,
                amount: parseFloat(amount),
                t_id: t_id,
                status: status,
                created_at: new Date().toISOString()
            }]);

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Payout recorded successfully!");
                // Reset form
                document.getElementById('payout-amount').value = '';
                document.getElementById('payout-tid').value = '';
                fetchPayoutLogs();
            }
        }

        // 1. Function to populate the dropdown (Call this inside your fetchAdminData after getting 'data.users')
function populateUserDropdown(users) {
    const dropdown = document.getElementById('payout-user-list');
    dropdown.innerHTML = '<option value="">-- Select Username --</option>' + 
        users.map(u => `<option value="${u.username}" data-uuid="${u.id}">${u.username}</option>`).join('');
}

// 2. Function to handle the Supabase Insert
async function processPayout() {
    const userSelect = document.getElementById('payout-user-list');
    const selectedOption = userSelect.options[userSelect.selectedIndex];
    
    const username = userSelect.value;
    const uuid = selectedOption.getAttribute('data-uuid'); // Fetches the actual ID
    const amount = document.getElementById('payout-amount').value;
    const t_id = document.getElementById('payout-tid').value;
    const status = document.getElementById('payout-status').value;

    if (!username || !amount || !t_id) return alert("All fields are required!");

    const { data, error } = await client.from('payouts').insert([{
        id: uuid,           // Mapping UUID to id column
        username: username,
        amount: parseFloat(amount),
        t_id: t_id,
        status: status,
        created_at: new Date().toISOString()
    }]);

    if (error) {
        alert("Error: " + error.message);
    } else {
        alert("Payout successfully recorded!");
        // Optional: clear inputs
        document.getElementById('payout-amount').value = '';
        document.getElementById('payout-tid').value = '';
        location.reload(); // Refresh to see logs
    }
}

        function switchTab(tabName) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            // Find the button that was clicked or matches the tabName
            const clickedBtn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.innerText.toLowerCase().includes(tabName));
            if(clickedBtn) clickedBtn.classList.add('active');

            document.querySelectorAll('.table-container').forEach(tc => tc.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            
            const titleMap = { 'dashboard': 'Platform Overview', 'users': 'User KYC Management', 'tips': 'Global Transactions', 'fraud': 'Security & Fraud Detection', 'payouts': 'Payout & Settlements' };
            document.getElementById('page-title').innerText = titleMap[tabName];
        }

        bootAdmin();
    </script>
</body>
</html>
