<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Admin | XDTip</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { width: 250px; background-color: #1e293b; border-right: 1px solid #334155; padding: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { margin-top: 0; color: #38bdf8; font-weight: 800; }
        .nav-btn { background: transparent; color: #cbd5e1; border: none; text-align: left; padding: 12px 15px; margin-bottom: 10px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.2s; }
        .nav-btn:hover, .nav-btn.active { background: #38bdf8; color: #0f172a; }
        .nav-btn.alert { border: 1px solid #ef4444; color: #ef4444; }
        .nav-btn.alert.active { background: #ef4444; color: #fff; }
        .logout-btn { margin-top: auto; color: #ef4444; }
        .logout-btn:hover { background: #ef4444; color: #fff; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header-title { font-size: 28px; margin-top: 0; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 15px;}

        /* --- CARDS --- */
        .cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .card { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; }
        .card h3 { margin: 0; font-size: 13px; color: #94a3b8; text-transform: uppercase; }
        .card .value { font-size: 32px; font-weight: 800; margin: 10px 0 0 0; color: #fff; }
        .card .value.green { color: #22c55e; }
        .card .value.red { color: #ef4444; }

        /* --- TABLES --- */
        .table-container { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; display: none; }
        .table-container.active { display: block; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px 20px; border-bottom: 1px solid #334155; }
        th { background: #0f172a; font-size: 13px; color: #94a3b8; text-transform: uppercase; }
        td { font-size: 15px; }
        tr:hover { background: #334155; }
        
        .badge { background: #3b82f6; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge.verified { background: #22c55e; color: #000; }
        .badge.pending { background: #f59e0b; color: #000; }
        .badge.danger { background: #ef4444; color: #fff; }

        .btn-approve { background: #22c55e; color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-approve:hover { background: #16a34a; }

        #loader { position: absolute; top:0; left:0; width:100%; height:100%; background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="loader"><h2 style="color:#38bdf8;">Authenticating Admin...</h2></div>

    <div class="sidebar">
        <h2>XDTIP ADMIN</h2>
        <button class="nav-btn active" onclick="switchTab('dashboard')">Dashboard</button>
        <button class="nav-btn" onclick="switchTab('users')">All Users (KYC)</button>
        <button class="nav-btn" onclick="switchTab('tips')">Transactions</button>
        <button class="nav-btn alert" onclick="switchTab('fraud')">Fraud Logs</button>
        <button class="nav-btn logout-btn" onclick="logout()">Exit Admin</button>
    </div>

    <div class="main-content">
        <h1 class="header-title" id="page-title">Platform Overview</h1>

        <div id="tab-dashboard" class="table-container active" style="background:transparent; border:none;">
            <div class="cards-grid">
                <div class="card"><h3>Total Users</h3><p class="value" id="stat-users">0</p></div>
                <div class="card"><h3>Total Tips</h3><p class="value" id="stat-tips">0</p></div>
                <div class="card"><h3>Platform Volume</h3><p class="value green" id="stat-revenue">₹0</p></div>
                <div class="card" style="border-color:#ef4444;"><h3>Flagged (Fraud)</h3><p class="value red" id="stat-fraud">0</p></div>
            </div>
        </div>

        <div id="tab-users" class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Legal Name</th>
                        <th>UPI ID</th>
                        <th>PAN Document</th>
                        <th>Joined Date</th>
                        <th>KYC Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="users-tbody"></tbody>
            </table>
        </div>

        <div id="tab-tips" class="table-container">
            <table>
                <thead>
                    <tr><th>Creator</th><th>Sender</th><th>Amount</th><th>Date</th></tr>
                </thead>
                <tbody id="tips-tbody"></tbody>
            </table>
        </div>

        <div id="tab-fraud" class="table-container" style="border-color: #ef4444;">
            <table>
                <thead>
                    <tr><th>Flag Reason</th><th>Creator targeted</th><th>Sender Details</th><th>Suspicious Amount</th></tr>
                </thead>
                <tbody id="fraud-tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const client = window.supabase.createClient(
            "https://yohrquotbdmsxfeyxtqr.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaHJxdW90YmRtc3hmZXl4dHFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzA5MzUsImV4cCI6MjA5MDk0NjkzNX0.C_8yl1JkBYUCoHjsFQWalWipOLmzJMJsJ8QyKjZu8MM"
        );

        let adminEmail = "";

        async function bootAdmin() {
            const { data: { session } } = await client.auth.getSession();
            if (!session) { window.location.href = "/login"; return; }
            adminEmail = session.user.email;

            fetchAdminData();
        }

        async function fetchAdminData() {
            try {
                const response = await fetch('/api/admin/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: adminEmail })
                });

                const data = await response.json();
                if (!data.success) { alert(data.error); window.location.href = "/dashboard"; return; }

                document.getElementById('loader').style.display = 'none';
                
                // Populate Cards
                document.getElementById('stat-users').innerText = data.totalUsers;
                document.getElementById('stat-tips').innerText = data.totalTips;
                document.getElementById('stat-revenue').innerText = "₹" + data.totalRevenue.toLocaleString('en-IN');
                document.getElementById('stat-fraud').innerText = data.fraudCount;

                // Populate Users & KYC (Updated for Text Column)
                // Populate Users & KYC (Mapped to exact Supabase columns)
                const usersHtml = data.users.map(u => {
                    const isVerified = (u.kyc === 'true'); // Looking for lowercase 'true'
                    const currentStatusText = u.kyc || 'Pending';

                    // 1. Safe Fallbacks using your exact column names
                    const fullName = u.name || '<span style="color:#64748b; font-size:12px; font-style:italic;">Not provided</span>';
                    const upiId = u.upi || '<span style="color:#64748b; font-size:12px; font-style:italic;">Not provided</span>';
                    
                    // 2. Clickable Image Link for PAN Photo
                    let panPhotoHtml = '<span style="color:#64748b; font-size:12px; font-style:italic;">No photo</span>';
                    if (u.pan_url) {
                        // Opens the image in a safe, new tab
                        panPhotoHtml = `<a href="${u.pan_url}" target="_blank" style="color:#38bdf8; text-decoration:none; font-weight:bold;">🖼️ View PAN</a>`;
                    }

                    return `
                    <tr>
                        <td style="font-weight:bold; color:#fff;">${u.username}</td>
                        <td style="color:#cbd5e1;">${fullName}</td>
                        <td style="color:#a855f7; font-family:monospace;">${upiId}</td>
                        <td>${panPhotoHtml}</td>
                        <td>${new Date(u.created_at).toLocaleDateString()}</td>
                        <td>${isVerified 
                            ? '<span class="badge verified">✓ Verified</span>' 
                            : `<span class="badge pending">${currentStatusText}</span>`}
                        </td>
                        <td>${!isVerified 
                            ? `<button class="btn-approve" onclick="approveKYC('${u.username}')">Approve KYC</button>` 
                            : '<span style="color:#64748b;">Completed</span>'}
                        </td>
                    </tr>
                    `;
                }).join('');
                document.getElementById('users-tbody').innerHTML = usersHtml;

                // Populate Transactions
                const tipsHtml = data.tips.map(t => `
                    <tr>
                        <td style="color:#38bdf8; font-weight:bold;">${t.username}</td>
                        <td>${t.sender_name}</td>
                        <td style="color:#22c55e; font-weight:bold;">₹${t.amount}</td>
                        <td>${new Date(t.created_at).toLocaleString()}</td>
                    </tr>
                `).join('');
                document.getElementById('tips-tbody').innerHTML = tipsHtml;

                // Populate Fraud Logs
                if (data.fraudLogs.length === 0) {
                    document.getElementById('fraud-tbody').innerHTML = `<tr><td colspan="4" style="text-align:center; color:#22c55e;">No fraudulent activity detected.</td></tr>`;
                } else {
                    const fraudHtml = data.fraudLogs.map(f => `
                        <tr style="background: rgba(239, 68, 68, 0.1);">
                            <td><span class="badge danger">High Amount Flag</span></td>
                            <td style="color:#fff; font-weight:bold;">${f.username}</td>
                            <td>${f.sender_name}</td>
                            <td style="color:#ef4444; font-weight:bold; font-size:18px;">₹${f.amount}</td>
                        </tr>
                    `).join('');
                    document.getElementById('fraud-tbody').innerHTML = fraudHtml;
                }

            } catch (err) { console.error(err); }
        }

        // KYC Action
        async function approveKYC(username) {
            if (!confirm(`Are you sure you want to approve KYC for ${username}?`)) return;

            try {
                const res = await fetch('/api/admin/approve-kyc', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: adminEmail, targetUsername: username })
                });
                const result = await res.json();
                
                if (result.success) {
                    alert(result.message);
                    fetchAdminData(); // Refresh table instantly
                } else {
                    alert(result.error);
                }
            } catch (err) { alert("Network error."); }
        }

        // Tabs
        function switchTab(tabName) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.table-container').forEach(tc => tc.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');

            const titleMap = { 'dashboard': 'Platform Overview', 'users': 'User KYC Management', 'tips': 'Global Transactions', 'fraud': 'Security & Fraud Detection' };
            document.getElementById('page-title').innerText = titleMap[tabName];
        }

        function logout() { window.location.href = "/dashboard"; }

        bootAdmin();
    </script>
</body>
</html>
