<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>Neon Overlay</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Hind:wght@600&display=swap');
        
        body { margin: 0; overflow: hidden; background: transparent; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', 'Hind', sans-serif; }
        
        #alert-box {
            text-align: center; opacity: 0; transform: skewX(-10deg) scale(0.8); transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            background: rgba(0, 0, 0, 0.9); padding: 40px; border: 4px solid #ff00ff;
            box-shadow: 0 0 30px #ff00ff, inset 0 0 20px #ff00ff; border-radius: 0px; min-width: 500px;
        }
        #alert-box.show { opacity: 1; transform: skewX(-10deg) scale(1); }
        
        .alert-text { font-size: 36px; color: #fff; margin: 0; text-transform: uppercase; text-shadow: 0 0 10px #fff; }
        .highlight { color: #00ffff; text-shadow: 0 0 20px #00ffff; } 
        .amount { color: #ff00ff; font-size: 50px; display: block; margin: 10px 0; text-shadow: 0 0 20px #ff00ff; }
        .message { font-size: 22px; color: #ddd; margin-top: 20px; font-weight: normal; font-family: sans-serif; }
        .alert-image { width: 100px; height: 100px; border: 3px solid #00ffff; border-radius: 50%; object-fit: cover; box-shadow: 0 0 15px #00ffff; }
    </style>
</head>
<body>
    <div id="alert-box">
        <img id="alert-image" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExODk1bDAycnU4dGlhcmVxaHl1cDVyeXgyNzhzdTNqbWp5YWdqNHQ4cCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/R0gIPkjPXY707X7nBI/giphy.gif">
        <h1 class="alert-text">
            <span id="sender" class="highlight">USER</span> <br> 
            JUST DROPPED <br> 
            <span id="amount" class="amount">500</span>
        </h1>
        <p class="message" id="message-text">Message goes here...</p>
    </div>

    <script>
        // 1. SUPABASE OBS FIX: disable 'persistSession'
        const client = window.supabase.createClient(
            "https://yohrquotbdmsxfeyxtqr.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaHJxdW90YmRtc3hmZXl4dHFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzA5MzUsImV4cCI6MjA5MDk0NjkzNX0.C_8yl1JkBYUCoHjsFQWalWipOLmzJMJsJ8QyKjZu8MM",
            { auth: { persistSession: false } }
        );

        var queue = []; 
        var isPlaying = false;

        var pathParts = window.location.pathname.split('/');
        var token = pathParts[pathParts.length - 1]; 
        if (!token) token = pathParts[pathParts.length - 2];

        async function initAlerts() {
            const { data: user, error } = await client
                .from('users')
                .select('username')
                .eq('obs_token', token)
                .single();

            if (error || !user) {
                console.error("OVERLAY ERROR: Invalid OBS Token");
                return;
            }

            console.log("📡 Neon Overlay Connected to OBS. Awaiting Tips for:", user.username);

            client
                .channel('public:tips')
                .on(
                    'postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'tips', filter: `username=eq.${user.username}` },
                    (payload) => {
                        const newTipData = {
                            tipper: payload.new.sender_name,
                            amount: payload.new.amount,
                            message: payload.new.message
                        };
                        queue.push(newTipData); 
                        processQueue();
                    }
                )
                .subscribe();
        }

        function processQueue() {
            if (isPlaying || queue.length === 0) return;
            isPlaying = true;
            var data = queue.shift();
            showAlert(data);
        }

        function showAlert(data) {
            var senderName = data.tipper || "Anonymous";
            var messageText = data.message || "Thank you for the support!";
            
            // Update Text
            if(document.getElementById('sender')) document.getElementById('sender').innerText = senderName;
            if(document.getElementById('amount')) document.getElementById('amount').innerText = "₹" + data.amount;
            if(document.getElementById('message-text')) document.getElementById('message-text').innerText = `"${messageText}"`;
            
            // Show Box
            var box = document.getElementById('alert-box');
            box.classList.add('show');

            // --- STREAM-ELEMENTS TTS (OBS Safe) ---
            var fullText = `${senderName} sent ${data.amount} rupees. ${messageText}`;
            var safeText = encodeURIComponent(fullText.substring(0, 200));
            
            // Auto-detect Hindi vs English to pick the right voice
            var hasHindiScript = /[\u0900-\u097F]/.test(fullText);
            var voice = hasHindiScript ? 'Aditi' : 'Brian'; 
            
            var audioUrl = `https://api.streamelements.com/kappa/v2/speech?voice=${voice}&text=${safeText}`;
            
            var audio = new Audio(audioUrl);
            audio.volume = 1.0;

            audio.onended = () => finishAlert(box);
            audio.onerror = () => { setTimeout(() => finishAlert(box), 5000); };

            audio.play().catch(e => { setTimeout(() => finishAlert(box), 5000); });
        }

        function finishAlert(box) {
            box.classList.remove('show'); 
            setTimeout(() => { 
                isPlaying = false; 
                processQueue(); 
            }, 1000); 
        }

        initAlerts();
    </script>
</body>
</html>
