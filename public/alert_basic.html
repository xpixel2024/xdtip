<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>basicgamerz Overlay</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* --- FONT SETUP --- */
        @font-face {
            font-family: 'Knocky';
            src: url('Knocky-SemiBold.woff2') format('woff2'),
                 url('Knocky-SemiBold.ttf') format('truetype');
            font-weight: 600;
            font-style: normal;
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background: transparent; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Knocky', sans-serif;
        }
        
        /* --- LAYOUT CONTAINER --- */
        #alert-box {
            text-align: center; 
            opacity: 0; 
            transform: scale(0.9); 
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            
            /* TRANSPARENT BACKGROUND - NO BOX */
            background: transparent;
            padding: 20px; 
            min-width: 500px;
            
            /* No Border around the container */
            border: none;
            box-shadow: none;
            
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        #alert-box.show { opacity: 1; transform: scale(1); }
        
        /* --- GIF STYLE (Full, No Round Border) --- */
        .alert-image { 
            /* Adjustable size - keeps aspect ratio */
            height: 150px; 
            width: auto; 
            
            /* REMOVED CIRCLE & BORDER */
            border-radius: 0; 
            border: none;
            
            /* Shadow to make the GIF pop */
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            
            margin-bottom: 10px;
            object-fit: contain; /* Shows full image */
        }

        /* --- TYPOGRAPHY --- */
        .alert-text { 
            font-size: 32px; 
            color: #fff; 
            margin: 5px 0; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            /* Strong Shadow for readability on transparent bg */
            text-shadow: 2px 2px 4px #000, 0 0 10px rgba(0,0,0,0.8);
        }
        
        /* 1. USER: Neon Red */
        #sender { 
            color: #FF0039; 
            font-size: 48px;
            display: block;
            margin-bottom: 0px;
            /* Neon Glow + Black Outline */
            text-shadow: 0 0 20px #FF0039, 3px 3px 0 #000;
        } 
        
        /* Helper Text */
        .sub-text {
            font-size: 20px;
            color: #ddd;
            vertical-align: middle;
            margin: 0 10px;
            text-shadow: 2px 2px 0 #000;
        }
        
        /* 2. AMOUNT: Bright Green */
        #amount { 
            color: #00FF00; 
            font-size: 55px; 
            display: inline-block;
            /* Neon Glow + Black Outline */
            text-shadow: 0 0 20px #00FF00, 3px 3px 0 #000;
        }
        
        /* 3. MESSAGE: Bright White */
        .message { 
            font-size: 28px; 
            color: #FFFFFF; 
            margin-top: 15px; 
            font-weight: normal; 
            /* Heavy Shadow for visibility */
            text-shadow: 2px 2px 4px #000, 0 0 10px #000;
            max-width: 600px;
            line-height: 1.4;
        }

    </style>
</head>
<body>

    <div id="alert-box">
        <img id="alert-image" class="alert-image" src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3pnaGo1dmYwaTJ4aXVtYjFhZm5jd3RzNTViMmgwdzFiejc3MjZoaiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/26gsjCZpPolPr3sBy/giphy.gif">
        
        <div class="alert-text">
            <span id="sender">USER</span>
            <div>
                <span class="sub-text">Send</span>
                <span id="amount">₹500</span>
            </div>
        </div>

        <p class="message" id="message-text">Message goes here...</p>
    </div>

    <script>
        var socket = io(); 
        var queue = []; 
        var isPlaying = false;

        var pathParts = window.location.pathname.split('/');
        var uuid = pathParts[pathParts.length - 1]; 
        if (!uuid) uuid = pathParts[pathParts.length - 2];

        if (uuid && uuid !== "overlay") { socket.emit('join-overlay', uuid); }

        socket.on('new-tip', (data) => { queue.push(data); processQueue(); });

        function processQueue() {
            if (isPlaying || queue.length === 0) return;
            isPlaying = true;
            var data = queue.shift();
            showAlert(data);
        }

        function showAlert(data) {
            var senderName = data.tipper || "Anonymous";
            var messageText = data.message || "Thank you for the support!";

            // Update Text
            document.getElementById('sender').innerText = senderName;
            document.getElementById('amount').innerText = "₹" + data.amount;
            document.getElementById('message-text').innerText = `"${messageText}"`;
            
            // Show Box
            var box = document.getElementById('alert-box');
            box.classList.add('show');

            // --- FIXED TTS LOGIC ---
            
            // 1. Prepare Text
            var fullText = `${senderName} sent ${data.amount} rupees. ${messageText}`;
            
            // 2. Detect Language
            var hasHindiScript = /[\u0900-\u097F]/.test(fullText);
            var lang = hasHindiScript ? 'hi' : 'en'; 
            
            // 3. Robust URL Generation (Prevents 403 Errors)
            var safeText = encodeURIComponent(fullText.substring(0, 200)); 
            // Added 'idx', 'total', 'textlen' to make it look like a real browser request
            var audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${safeText}&tl=${lang}&total=1&idx=0&textlen=${safeText.length}&client=tw-ob&prev=input&ttsspeed=1`;

            var audio = new Audio(audioUrl);
            
            // 4. Events
            audio.onended = () => finishAlert(box);
            
            // Safety: If audio fails/blocks, close box after 5s anyway
            audio.onerror = () => {
                console.error("Audio failed to load (Check OBS/Network)");
                setTimeout(() => finishAlert(box), 5000); 
            };

            // Play
            audio.play().catch(e => {
                console.error("Autoplay blocked:", e);
                // If blocked, wait 5s then close
                setTimeout(() => finishAlert(box), 5000);
            });
        }

        function finishAlert(box) {
            setTimeout(() => { 
                box.classList.remove('show'); 
                setTimeout(() => { 
                    isPlaying = false; 
                    processQueue(); 
                }, 1000); 
            }, 2000);
        }
    </script>
</body>
</html>
