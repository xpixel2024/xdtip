<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>basicgamerz Overlay</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* --- FONT SETUP --- */
        @font-face {
            font-family: 'Knocky';
            src: url('Knocky-SemiBold.woff2') format('woff2'),
                 url('Knocky-SemiBold.ttf') format('truetype');
            font-weight: 600;
            font-style: normal;
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background: transparent; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Knocky', sans-serif;
        }
        
        /* --- LAYOUT CONTAINER --- */
        #alert-box {
            text-align: center; 
            opacity: 0; 
            transform: scale(0.9); 
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            
            /* TRANSPARENT BACKGROUND - NO BOX */
            background: transparent;
            padding: 20px; 
            min-width: 500px;
            
            /* No Border around the container */
            border: none;
            box-shadow: none;
            
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        #alert-box.show { opacity: 1; transform: scale(1); }
        
        /* --- GIF STYLE (Full, No Round Border) --- */
        .alert-image { 
            /* Adjustable size - keeps aspect ratio */
            height: 150px; 
            width: auto; 
            
            /* REMOVED CIRCLE & BORDER */
            border-radius: 0; 
            border: none;
            
            /* Shadow to make the GIF pop */
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            
            margin-bottom: 10px;
            object-fit: contain; /* Shows full image */
        }

        /* --- TYPOGRAPHY --- */
        .alert-text { 
            font-size: 32px; 
            color: #fff; 
            margin: 5px 0; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            /* Strong Shadow for readability on transparent bg */
            text-shadow: 2px 2px 4px #000, 0 0 10px rgba(0,0,0,0.8);
        }
        
        /* 1. USER: Neon Red */
        #sender { 
            color: #FF0039; 
            font-size: 48px;
            display: block;
            margin-bottom: 0px;
            /* Neon Glow + Black Outline */
            text-shadow: 0 0 20px #FF0039, 3px 3px 0 #000;
        } 
        
        /* Helper Text */
        .sub-text {
            font-size: 20px;
            color: #ddd;
            vertical-align: middle;
            margin: 0 10px;
            text-shadow: 2px 2px 0 #000;
        }
        
        /* 2. AMOUNT: Bright Green */
        #amount { 
            color: #00FF00; 
            font-size: 55px; 
            display: inline-block;
            /* Neon Glow + Black Outline */
            text-shadow: 0 0 20px #00FF00, 3px 3px 0 #000;
        }
        
        /* 3. MESSAGE: Bright White */
        .message { 
            font-size: 28px; 
            color: #FFFFFF; 
            margin-top: 15px; 
            font-weight: normal; 
            /* Heavy Shadow for visibility */
            text-shadow: 2px 2px 4px #000, 0 0 10px #000;
            max-width: 600px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="alert-box">
        <img id="alert-image" class="alert-image" src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3pnaGo1dmYwaTJ4aXVtYjFhZm5jd3RzNTViMmgwdzFiejc3MjZoaiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/26gsjCZpPolPr3sBy/giphy.gif">
        
        <div class="alert-text">
            <span id="sender">USER</span>
            <div>
                <span class="sub-text">Send</span>
                <span id="amount">₹500</span>
            </div>
        </div>

        <p class="message" id="message-text">Message goes here...</p>
    </div>

    <script>
        // 1. SUPABASE OBS FIX: disable 'persistSession'
        const client = window.supabase.createClient(
            "https://yohrquotbdmsxfeyxtqr.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaHJxdW90YmRtc3hmZXl4dHFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzA5MzUsImV4cCI6MjA5MDk0NjkzNX0.C_8yl1JkBYUCoHjsFQWalWipOLmzJMJsJ8QyKjZu8MM",
            { auth: { persistSession: false } }
        );

        var queue = []; 
        var isPlaying = false;

        var pathParts = window.location.pathname.split('/');
        var token = pathParts[pathParts.length - 1]; 
        if (!token) token = pathParts[pathParts.length - 2];

        async function initAlerts() {
            const { data: user, error } = await client
                .from('users')
                .select('username')
                .eq('obs_token', token)
                .single();

            if (error || !user) {
                console.error("OVERLAY ERROR: Invalid OBS Token");
                return;
            }

            console.log("📡 FROST Connected to OBS. Awaiting Tips for:", user.username);

            client
                // Channel name matches the server broadcast room
                .channel(`alert-room-${user.username.toLowerCase()}`)
                
                // Listener for REAL MONEY (Database)
                .on(
                    'postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'tips', filter: `username=eq.${user.username}` },
                    (payload) => {
                        console.log("💰 REAL TIP RECEIVED:", payload.new);
                        queue.push({
                            tipper: payload.new.sender_name,
                            amount: payload.new.amount,
                            message: payload.new.message
                        }); 
                        processQueue();
                    }
                )
                
                // Listener for TEST ALERTS (Walkie-Talkie)
                .on(
                    'broadcast',
                    { event: 'test-tip' },
                    (payload) => {
                        console.log("🛠️ TEST TIP RECEIVED:", payload);
                        
                        // Safely unpack the payload whether it's nested or not
                        let alertData = payload.payload || payload;
                        
                        queue.push({
                            tipper: alertData.tipper || "System",
                            amount: alertData.amount || 0,
                            message: alertData.message || "Test Successful!"
                        }); 
                        processQueue();
                    }
                )
                .subscribe((status) => {
                    console.log("Supabase Connection Status:", status);
                });
        }

        function processQueue() {
            if (isPlaying || queue.length === 0) return;
            isPlaying = true;
            var data = queue.shift();
            showAlert(data);
        }

        function showAlert(data) {
            var senderName = data.tipper || "Anonymous";
            var messageText = data.message || "Thank you for the support!";

            // Update Text Safely
            if(document.getElementById('sender')) document.getElementById('sender').innerText = senderName;
            if(document.getElementById('amount')) document.getElementById('amount').innerText = "₹" + data.amount;
            if(document.getElementById('message-text')) document.getElementById('message-text').innerText = `"${messageText}"`;
            
            // Show Box
            var box = document.getElementById('alert-box');
            if(box) box.classList.add('show');

            // --- DUAL-ENGINE TTS SYSTEM ---
            var fullText = `${senderName} sent ${data.amount} rupees. ${messageText}`;
            var safeText = encodeURIComponent(fullText.substring(0, 200));
            
            var hasHindiScript = /[\u0900-\u097F]/.test(fullText);
            var seVoice = hasHindiScript ? 'Aditi' : 'Brian'; 
            var googleLang = hasHindiScript ? 'hi' : 'en';
            
            // Engine 1: StreamElements (High Quality)
            var seAudioUrl = `https://api.streamelements.com/kappa/v2/speech?voice=${seVoice}&text=${safeText}`;
            // Engine 2: Google Translate (Bulletproof Fallback)
            var googleAudioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${safeText}&tl=${googleLang}&client=tw-ob`;
            
            var audio = new Audio(seAudioUrl);
            audio.volume = 1.0;

            audio.onended = () => finishAlert(box);
            
            // If StreamElements fails, immediately try Google
            audio.onerror = (e) => { 
                console.warn("⚠️ StreamElements TTS Failed. Falling back to Google TTS...");
                
                var backupAudio = new Audio(googleAudioUrl);
                backupAudio.onended = () => finishAlert(box);
                backupAudio.onerror = () => {
                    console.error("❌ Both TTS Engines Failed.");
                    setTimeout(() => finishAlert(box), 5000);
                };
                
                backupAudio.play().catch(err => {
                    console.error("Autoplay Blocked on Backup Audio:", err);
                    setTimeout(() => finishAlert(box), 5000);
                });
            };

            var playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(e => { 
                    console.error("Autoplay blocked! (Click the screen if testing in Chrome)", e);
                    setTimeout(() => finishAlert(box), 5000); 
                });
            }
        }

        function finishAlert(box) {
            if(box) box.classList.remove('show'); 
            setTimeout(() => { 
                isPlaying = false; 
                processQueue(); 
            }, 1000); 
        }

        initAlerts();
    </script>
</body>
</html>
