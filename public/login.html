<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<meta charset="UTF-8">
<title>XDTip | Authorization Gateway</title>

<link rel="icon" type="image/png" href="images/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --neon-cyan: #00f3ff;
  --neon-magenta: #ff00ea;
  --bg-dark: #03040b;
  --panel-bg: rgba(5, 8, 20, 0.85);
  --grid-color: rgba(0, 243, 255, 0.05);
}

body {
  margin: 0;
  font-family: 'Rajdhani', sans-serif;
  background-color: var(--bg-dark);
  color: #c8d3f5;
  overflow: hidden; 
}

/* CRT Scanlines and Grid Background */
.bgfx {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1;
  background-image: 
    linear-gradient(var(--grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
  background-size: 40px 40px;
}

.bgfx::after {
  content: "";
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
              linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  background-size: 100% 4px, 3px 100%;
  pointer-events: none;
}

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 1;
}

/* Logo placement above card */
.login-logo {
    height: 100px;
    margin-bottom: 30px;
    filter: drop-shadow(0 0 15px var(--neon-cyan));
}

.card {
  background: var(--panel-bg);
  border: 1px solid rgba(0, 243, 255, 0.2);
  box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
  padding: 50px 40px;
  width: 340px;
  text-align: center;
  backdrop-filter: blur(10px);
  position: relative;
}

.card::before, .card::after {
  content: ''; 
  position: absolute; 
  width: 25px; 
  height: 25px; 
  border: 2px solid var(--neon-cyan); 
}
.card::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
.card::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

.sys-label {
  position: absolute;
  top: -12px;
  left: 20px;
  background: var(--bg-dark);
  padding: 0 10px;
  color: var(--neon-cyan);
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  letter-spacing: 1px;
}

h1 {
  margin-bottom: 5px;
  font-size: 38px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
}

.highlight {
  color: var(--neon-cyan);
  text-shadow: 0 0 15px var(--neon-cyan);
}

p {
  color: #8fa1d0;
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  margin-bottom: 35px;
}

.btn {
  margin-top: 10px;
  padding: 15px;
  width: 100%;
  background: rgba(0, 243, 255, 0.05);
  border: 1px solid var(--neon-cyan);
  color: var(--neon-cyan);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
  transition: 0.3s;
  box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.2);
  clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
}

.btn:hover {
  background: var(--neon-cyan);
  color: #000;
  box-shadow: 0 0 20px var(--neon-cyan);
  text-shadow: none;
}

.scanline {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: rgba(0, 243, 255, 0.5);
  box-shadow: 0 0 10px var(--neon-cyan);
  opacity: 0.5;
  animation: scan 4s linear infinite;
  pointer-events: none;
}

@keyframes scan {
  0% { top: 0; opacity: 0; }
  10% { opacity: 0.5; }
  90% { opacity: 0.5; }
  100% { top: 100%; opacity: 0; }
}
</style>

</head>
<body>

<div class="bgfx"></div>

<div class="container">
  <img src="images/logo.png" alt="XDTIP" class="login-logo">

  <div class="card">
    <div class="scanline"></div>
    <div class="sys-label">SECURE_LOGIN</div>
    
    <h1><span class="highlight">XDTIP</span> // UPLINK</h1>
    <p>> AWAITING CREATOR CREDENTIALS...</p>

    <button class="btn" onclick="login()">
      [ INIT GOOGLE_OAUTH ]
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://yohrquotbdmsxfeyxtqr.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvaHJxdW90YmRtc3hmZXl4dHFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzA5MzUsImV4cCI6MjA5MDk0NjkzNX0.C_8yl1JkBYUCoHjsFQWalWipOLmzJMJsJ8QyKjZu8MM"
);

// --- GLOBAL SESSION CHECK ---
// If the user is already logged in, don't show the login page, just send them to dashboard
async function checkExistingSession() {
    const { data: { user } } = await client.auth.getUser();
    if (user) {
        window.location.href = "/dashboard";
    }
}
checkExistingSession();

async function login() {
  console.log("Uplink initiated with YouTube permissions...");

  const { error } = await client.auth.signInWithOAuth({
    provider: "google",
    options: {
      // 1. We ask for YouTube access immediately
      scopes: 'https://www.googleapis.com/auth/youtube.readonly',
      queryParams: {
        access_type: 'offline', // 2. This ensures we get a REFRESH_TOKEN for the backend
        prompt: 'consent',      // 3. This forces the "YouTube" checkbox to appear every time
      },
      // 4. We send them to the dashboard after they click 'Allow'
      redirectTo: "https://xdtip.in/dashboard"
    }
  });

  if (error) {
    console.error(error);
    alert("AUTHORIZATION FAILED: " + error.message);
  }
}
</script>

</body>
</html>
